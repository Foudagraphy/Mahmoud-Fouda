<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--gold:#d6b25e;
--text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HERO */
.hero{
height:90vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid var(--gold);
}

.hero h1{font-size:34px;margin-top:10px;}
.hero p{color:var(--gold);margin:10px 0 20px;}

.btn{
display:inline-block;
padding:10px 24px;
border:2px solid var(--gold);
color:var(--gold);
border-radius:30px;
text-decoration:none;
cursor:pointer;
}

.btn:hover{background:var(--gold);color:#000;}

/* LINKS */
.links{
max-width:500px;
margin:auto;
padding:20px;
}

.link{
display:block;
text-align:center;
padding:14px;
margin:10px 0;
background:var(--card);
border-radius:12px;
color:#fff;
text-decoration:none;
}

/* SECTION */
.section-title{
text-align:center;
color:var(--gold);
margin:30px 0 15px;
}

/* GALLERY */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
max-width:1000px;
margin:auto;
padding:20px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
}

button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
color:#fff;
}

/* ADMIN */
.admin{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:var(--card);
padding:15px;
margin:10px 0;
border-radius:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="MHMD0415.jpg">
<h1>Foudagraphy Studio</h1>
<p>Global Creative Agency</p>
<a class="btn" href="#booking">Book Now</a>
</div>
</div>

<!-- LINKS -->
<div class="links">
<a class="link" href="#">Facebook</a>
<a class="link" href="#">Instagram</a>
<a class="link" href="#">TikTok</a>
</div>

<!-- GALLERY -->
<h2 class="section-title">Portfolio</h2>

<div class="grid">
<img src="BG.jpg">
<img src="BG2.jpg">
<img src="BG3.jpg">
<img src="BG4.jpg">
<img src="BG5.jpg">
<img src="BG6.jpg">
</div>

<!-- BOOKING -->
<h2 class="section-title" id="booking">Book Now</h2>

<div class="form">
<form id="bookingForm">

<input type="text" id="name" placeholder="الاسم" required>
<input type="tel" id="phone" placeholder="الرقم" required>
<textarea id="message" placeholder="تفاصيل الحجز"></textarea>

<input type="file" id="paymentImage" accept="image/*" required>

<button type="submit">إرسال الحجز</button>

<p id="status" style="text-align:center;margin-top:10px;"></p>

</form>
</div>

<!-- ADMIN -->
<h2 class="section-title">Admin Dashboard</h2>
<div class="admin" id="adminPanel">
<p style="color:#aaa;text-align:center;">Loading bookings...</p>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="close" onclick="closeLB()">×</div>
<img id="lbImg">
</div>

<script>
/* LIGHTBOX */
const imgs=document.querySelectorAll(".grid img");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");

imgs.forEach(img=>{
img.onclick=()=>{
lb.style.display="flex";
lbImg.src=img.src;
}
});

function closeLB(){lb.style.display="none"}
lb.onclick=(e)=>{if(e.target===lb)closeLB()}

/* CLOUDINARY */
const CLOUD_NAME="foudagraphy";
const UPLOAD_PRESET="foudagraphy_upload";

async function uploadImage(file){
const fd=new FormData();
fd.append("file",file);
fd.append("upload_preset",UPLOAD_PRESET);

const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
method:"POST",
body:fd
});

const data=await res.json();
return data.secure_url;
}

/* FORM */
const form=document.getElementById("bookingForm");
const status=document.getElementById("status");

form.addEventListener("submit",async(e)=>{
e.preventDefault();

status.innerText="⏳ Sending...";

const name=nameInput.value=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const message=document.getElementById("message").value;
const file=document.getElementById("paymentImage").files[0];

const imageURL=await uploadImage(file);

/* Formspree */
await fetch("https://formspree.io/f/xdabenkv",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone,message,imageURL})
});

status.innerText="✅ Done";
form.reset();
});

/* ADMIN (local demo) */
const adminPanel=document.getElementById("adminPanel");

fetch("https://api.formspree.io/forms/xdabenkv/submissions")
.catch(()=>{})
.then(()=> {
adminPanel.innerHTML=`
<div class="card">📌 الحجوزات بتظهر في Email أو Formspree dashboard</div>
`;
});
</script>

</body>
</html>
