<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0b0b;
  --card:#161616;
  --gold:#d6b25e;
  --text:#fff;
  --muted:#b3b3b3;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HERO (Agency Style) */
.hero{
height:90vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
padding:20px;
}

.hero img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
margin-bottom:10px;
box-shadow:0 0 25px rgba(214,178,94,0.3);
}

.hero h1{
font-size:34px;
letter-spacing:1px;
}

.hero p{
color:var(--gold);
margin:10px 0 20px;
}

.btn{
display:inline-block;
padding:10px 24px;
border:2px solid var(--gold);
color:var(--gold);
text-decoration:none;
border-radius:30px;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
transform:scale(1.05);
}

/* SECTION TITLE */
.section-title{
text-align:center;
margin:40px 0 20px;
font-size:22px;
color:var(--gold);
}

/* LINKS */
.links{
max-width:500px;
margin:20px auto;
padding:0 15px;
}

.link{
display:block;
text-align:center;
padding:14px;
margin:10px 0;
background:var(--card);
border-radius:12px;
text-decoration:none;
color:var(--text);
transition:.3s;
border:1px solid transparent;
}

.link:hover{
border-color:var(--gold);
transform:translateY(-3px);
}

/* GALLERY (THUMBNAIL STYLE) */
.gallery{
max-width:1000px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.grid img{
width:100%;
height:120px;              /* 🔥 ده اللي صغّر الصور */
object-fit:cover;
border-radius:10px;
transition:.3s;
filter:brightness(0.9);
}

.grid img:hover{
transform:scale(1.08);
filter:brightness(1.1);
}

/* FORM */
.form{
max-width:500px;
margin:40px auto;
padding:0 15px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
outline:none;
}

textarea{
height:110px;
resize:none;
}

button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#b8953f;
}

/* FOOTER */
.footer{
text-align:center;
padding:20px;
opacity:.6;
font-size:13px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="hero-content">

<h1>Foudagraphy Studio</h1>

</div>
</div>

</div>

<div class="gallery">

<div class="footer">© 2026 Foudagraphy Studio</div>

</body>
</html>
