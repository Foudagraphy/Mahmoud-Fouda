<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Global Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b0b0b;
--card:#161616;
--gold:#d6b25e;
--text:#fff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:var(--bg);
color:var(--text);
}

/* HERO */
.hero{
height:90vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
}

.hero img{
width:130px;
height:130px;
border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
cursor:pointer;
}

.hero h1{font-size:34px;margin-top:10px;}
.hero p{color:var(--gold);margin:10px 0 20px;}

.btn{
display:inline-block;
padding:10px 24px;
border:2px solid var(--gold);
color:var(--gold);
text-decoration:none;
border-radius:30px;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
}

/* LINKS */
.links{
max-width:500px;
margin:auto;
padding:20px;
}

.link{
display:block;
text-align:center;
padding:14px;
margin:10px 0;
background:var(--card);
border-radius:12px;
text-decoration:none;
color:#fff;
transition:.3s;
}

.link:hover{
transform:translateY(-3px);
border:1px solid var(--gold);
}

/* SECTION */
.section-title{
text-align:center;
color:var(--gold);
margin:30px 0 15px;
}

/* GALLERY */
.gallery{
max-width:1000px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.grid img:hover{
transform:scale(1.08);
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

#lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
color:#fff;
}

.controls{
margin-top:15px;
display:flex;
gap:15px;
}

.controls button{
width:auto;
padding:10px 15px;
background:var(--gold);
border:none;
border-radius:8px;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:.6;
font-size:13px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="MHMD0415.jpg" loading="eager">
<h1>Foudagraphy Studio</h1>
<p>Global Creative Photography Agency</p>
<a href="https://wa.me/201551927206" class="btn">Book Now</a>
</div>
</div>

<!-- LINKS -->
<div class="links">
<a class="link" href="#">Facebook</a>
<a class="link" href="#">Instagram</a>
<a class="link" href="#">TikTok</a>
<a class="link" href="tel:01094500264">Call Now</a>
</div>

<!-- GALLERY -->
<h2 class="section-title">Portfolio</h2>

<div class="gallery">
<div class="grid">
<img src="BG.jpg" loading="lazy">
<img src="BG2.jpg" loading="lazy">
<img src="BG3.jpg" loading="lazy">
<img src="BG4.jpg" loading="lazy">
<img src="BG5.jpg" loading="lazy">
<img src="BG6.jpg" loading="lazy">
</div>
</div>

<!-- BOOKING -->
<h2 class="section-title">Book Now</h2>

<div class="form">
<form id="bookingForm">

<input type="text" id="name" placeholder="الاسم" required>
<input type="tel" id="phone" placeholder="رقم الهاتف" required>

<textarea id="message" placeholder="تفاصيل الحجز"></textarea>

<p style="color:#aaa;font-size:13px;text-align:center;">
ارفع صورة تحويل الدفع لتأكيد الحجز
</p>

<input type="file" id="paymentImage" accept="image/*" required>

<button type="submit">إرسال الحجز</button>

<p id="status" style="text-align:center;margin-top:10px;color:#aaa;"></p>

</form>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="close" onclick="closeLB()">×</div>
<img id="lbImg">

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>
</div>

<footer>© 2026 Foudagraphy Studio</footer>

<script>
const imgs = document.querySelectorAll(".grid img");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
let index = 0;

imgs.forEach((img,i)=>{
img.onclick=()=>{
index=i;
lb.style.display="flex";
lbImg.src=img.src;
}
});

function closeLB(){lb.style.display="none"}
function next(){index=(index+1)%imgs.length;lbImg.src=imgs[index].src;}
function prev(){index=(index-1+imgs.length)%imgs.length;lbImg.src=imgs[index].src;}

lb.onclick=(e)=>{if(e.target===lb)closeLB()}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVhVeLqfC1iDHLyHaqw71VR-n7OmWNDls",
  authDomain: "foudagraphy-5aaaf.firebaseapp.com",
  projectId: "foudagraphy-5aaaf",
  storageBucket: "foudagraphy-5aaaf.firebasestorage.app",
  messagingSenderId: "421162081730",
  appId: "1:421162081730:web:28fa3be6f3a62e0f5bca5b",
  measurementId: "G-F06PG9ZS6H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const form = document.getElementById("bookingForm");
const status = document.getElementById("status");

form.addEventListener("submit", async (e)=>{
e.preventDefault();

status.innerText="⏳ جاري إرسال الحجز...";

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const message=document.getElementById("message").value;
const file=document.getElementById("paymentImage").files[0];

try{

const imgRef=ref(storage,"payments/"+Date.now()+file.name);
await uploadBytes(imgRef,file);
const imageURL=await getDownloadURL(imgRef);

await addDoc(collection(db,"bookings"),{
name,phone,message,
imageURL,
status:"pending",
date:new Date().toISOString()
});

status.innerText="✅ تم إرسال الحجز";
form.reset();

}catch(err){
status.innerText="❌ خطأ حاول مرة أخرى";
}
});
</script>

</body>
</html>
