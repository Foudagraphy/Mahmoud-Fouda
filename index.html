<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Foudagraphy | Global Photography Agency</title>

<meta name="description" content="Professional photography services for weddings, products, and cinematic videos.">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
--bg:#0a0a0a;
--card:#151515;
--gold:#d6b25e;
--text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}

body{background:var(--bg);color:var(--text);overflow-x:hidden;}

/* HERO */
.hero{
height:100vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:radial-gradient(circle, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
}

.hero-content{position:relative;z-index:2;}

.hero img{
width:140px;height:140px;border-radius:50%;
border:3px solid var(--gold);
object-fit:cover;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:42px;
margin-top:10px;
}

.hero p{color:var(--gold);margin:10px 0 20px;}

/* BUTTON */
.btn{
display:inline-flex;
align-items:center;
gap:8px;
padding:12px 28px;
border:2px solid var(--gold);
color:var(--gold);
text-decoration:none;
border-radius:30px;
transition:.3s;
position:relative;
overflow:hidden;
}

.btn:hover{
background:var(--gold);
color:#000;
transform:scale(1.05);
}

.btn::after{
content:'';
position:absolute;
inset:0;
border-radius:30px;
border:2px solid var(--gold);
animation:pulse 1.8s infinite;
opacity:0;
}

.btn:hover::after{opacity:1;}

@keyframes pulse{
0%{transform:scale(1);opacity:.6;}
70%{transform:scale(1.4);opacity:0;}
100%{transform:scale(1.4);opacity:0;}
}

/* SOCIAL */
.links{
padding:25px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.links a{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;
width:75px;height:75px;
border-radius:15px;
background:var(--card);
color:#fff;
text-decoration:none;
transition:.3s;
}

.links a:hover{transform:translateY(-5px) scale(1.05);}

/* SECTION */
.section{padding:60px 20px;max-width:1000px;margin:auto;}
.section-title{text-align:center;color:var(--gold);margin-bottom:30px;}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.service{
background:#151515;
padding:25px;
border-radius:15px;
text-align:center;
transition:.3s;
}

.service:hover{transform:translateY(-10px);}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
}

.gallery img:hover{transform:scale(1.03);}

/* FORM */
.form{max-width:500px;margin:auto;}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1e1e1e;
color:#fff;
}

button{
width:100%;
padding:14px;
background:var(--gold);
border:none;
border-radius:12px;
cursor:pointer;
}

/* FLOAT */
.floating-panel{
position:fixed;
bottom:25px;
right:20px;
z-index:9999;
}

.floating-book{
background:#d6b25e;
color:#000;
padding:12px 16px;
border-radius:30px;
text-decoration:none;
font-weight:bold;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
width:55px;height:55px;
background:#25D366;
color:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
z-index:9999;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:10px;
}

footer{text-align:center;padding:20px;opacity:.5;}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">

<img src="MHMD0415.jpg" alt="Photographer">

<h1>Foudagraphy</h1>
<p>Global Photography Agency</p>

<a class="btn" href="https://foudagraphy.github.io/booking/#booking">
<i class="fas fa-layer-group"></i> الباكيدجات والحجز
</a>

</div>
</div>

<!-- SOCIAL -->
<div class="links">
<a href="https://www.instagram.com/foudagraphy_official/" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://www.facebook.com/MahmoudFouda8282" target="_blank"><i class="fab fa-facebook"></i></a>
<a href="https://www.tiktok.com/@foudagraphy_official" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="tel:01551927206"><i class="fas fa-phone"></i></a>
</div>

<!-- SERVICES -->
<div class="section">
<h2 class="section-title">الخدمات</h2>
<div class="services">
<div class="service">تصوير حفلات الزفاف</div>
<div class="service">تصوير المنتجات</div>
<div class="service">تصوير فيديو</div>
</div>
</div>

<!-- GALLERY -->
<div class="section">
<h2 class="section-title">Portfolio</h2>

<div class="gallery">
<img src="BG.jpg" onclick="openImage(this.src)" loading="lazy">
<img src="BG2.jpg" onclick="openImage(this.src)" loading="lazy">
<img src="BG3.jpg" onclick="openImage(this.src)" loading="lazy">
<img src="BG4.jpg" onclick="openImage(this.src)" loading="lazy">
<img src="BG5.jpg" onclick="openImage(this.src)" loading="lazy">
<img src="BG6.jpg" onclick="openImage(this.src)" loading="lazy">
</div>

</div>

<!-- FLOAT -->
<div class="floating-panel">
<a class="floating-book" href="https://foudagraphy.github.io/booking/#booking">
📸 احجز الآن
</a>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/201551927206?text=عايز%20احجز%20سيشن" class="whatsapp" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>
function openImage(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=src;
}

function closeImage(){
document.getElementById("lightbox").style.display="none";
}
</script>

<footer>© 2026 Foudagraphy</footer>

</body>
</html>
