<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foudagraphy | Global Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0a0a0a;
--card:#151515;
--gold:#d6b25e;
--text:#fff;
--muted:#b5b5b5;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
scroll-behavior:smooth;
}

body{
background:var(--bg);
color:var(--text);
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
z-index:1000;
}

nav h2{
color:var(--gold);
font-size:18px;
}

nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
font-size:14px;
opacity:.8;
}

nav a:hover{
color:var(--gold);
opacity:1;
}

/* HERO */
.hero{
height:100vh;
background:url('IMG_8457.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
text-align:center;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero img{
width:140px;
height:140px;
border-radius:50%;
border:3px solid var(--gold);
margin-bottom:10px;
}

.hero h1{
font-size:38px;
}

.hero p{
color:var(--gold);
margin:10px 0 20px;
}

.btn{
display:inline-block;
padding:12px 26px;
border:2px solid var(--gold);
color:var(--gold);
border-radius:30px;
text-decoration:none;
transition:.3s;
}

.btn:hover{
background:var(--gold);
color:#000;
}

/* SECTIONS */
section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.title{
text-align:center;
color:var(--gold);
margin-bottom:30px;
font-size:24px;
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:var(--card);
padding:20px;
border-radius:12px;
text-align:center;
transition:.3s;
border:1px solid transparent;
}

.card:hover{
border-color:var(--gold);
transform:translateY(-5px);
}

/* GALLERY */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:10px;
}

.grid img{
width:100%;
height:130px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.grid img:hover{
transform:scale(1.07);
}

/* CONTACT */
input,textarea{
width:100%;
padding:12px;
margin:8px 0;
background:#1c1c1c;
border:none;
border-radius:8px;
color:#fff;
}

button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,0.92);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
flex-direction:column;
}

#lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
color:#fff;
}

.controls{
margin-top:15px;
}

.controls button{
padding:8px 14px;
margin:0 5px;
background:var(--gold);
border:none;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:.6;
font-size:13px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>Foudagraphy</h2>
<div>
<a href="#services">Services</a>
<a href="#work">Work</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<img src="MHMD0415.JPG" loading="eager">
<h1>Foudagraphy Studio</h1>
<p>Global Creative Photography Agency</p>
<a href="https://wa.me/201551927206" class="btn">Book Now</a>
</div>
</div>

<!-- SERVICES -->
<section id="services">
<h2 class="title">Our Services</h2>

<div class="services">
<div class="card">Portrait Photography</div>
<div class="card">Wedding Coverage</div>
<div class="card">Commercial Shoots</div>
<div class="card">Event Photography</div>
</div>
</section>

<!-- GALLERY -->
<section id="work">
<h2 class="title">Portfolio</h2>

<div class="grid">
<img src="BG.jpg" loading="lazy">
<img src="BG2.jpg" loading="lazy">
<img src="BG3.jpg" loading="lazy">
<img src="BG4.jpg" loading="lazy">
<img src="BG5.jpg" loading="lazy">
<img src="BG6.jpg" loading="lazy">
</div>
</section>

<!-- CONTACT -->
<section id="contact">
<h2 class="title">Contact Us</h2>

<form action="https://formspree.io/f/xdabenkv" method="POST">
<input type="text" name="name" placeholder="Name" required>
<input type="tel" name="phone" placeholder="Phone" required>
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>
</section>

<footer>
© 2026 Foudagraphy Studio — All Rights Reserved
</footer>

<!-- LIGHTBOX -->
<div id="lightbox">
<div class="close" onclick="closeLB()">×</div>
<img id="lbImg">
<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
</div>
</div>

<script>
const imgs = document.querySelectorAll(".grid img");
const lb = document.getElementById("lightbox");
const lbImg = document.getElementById("lbImg");
let index = 0;

imgs.forEach((img,i)=>{
img.onclick=()=>{
index=i;
lb.style.display="flex";
lbImg.src=img.src;
}
});

function closeLB(){lb.style.display="none"}

function next(){
index=(index+1)%imgs.length;
lbImg.src=imgs[index].src;
}

function prev(){
index=(index-1+imgs.length)%imgs.length;
lbImg.src=imgs[index].src;
}

lb.onclick=(e)=>{if(e.target===lb)closeLB()}
</script>

</body>
</html>
