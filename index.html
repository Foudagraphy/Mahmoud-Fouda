<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}

body {
    height: 100vh;
    background: url('IMG_8457.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(15px);
    background: rgba(0,0,0,0.65);
}

/* Container */
.container {
    position: relative;
    text-align: center;
    width: 90%;
    max-width: 380px;
    animation: fadeIn 1.2s ease;
}

/* Profile */
.profile img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid gold;
    object-fit: cover;
    margin-bottom: 10px;
    animation: scaleIn 1s ease;
}

h1 {
    letter-spacing: 2px;
    font-size: 26px;
}

.subtitle {
    color: gold;
    font-size: 14px;
    margin-bottom: 25px;
}

/* Links */
.link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 10px 0;
    padding: 14px;
    border-radius: 16px;
    background: rgba(255,255,255,0.08);
    text-decoration: none;
    color: white;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
}

.link i {
    width: 20px;
}

/* Hover */
.link:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.15);
}

/* Primary Button */
.primary {
    border: 2px solid gold;
    color: gold;
    font-weight: bold;
    background: transparent;
}

.primary:hover {
    background: gold;
    color: black;
}

/* Floating WhatsApp */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 24px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.whatsapp:hover {
    transform: scale(1.1);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.6;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes scaleIn {
    from {transform: scale(0);}
    to {transform: scale(1);}
}
</style>

</head>
